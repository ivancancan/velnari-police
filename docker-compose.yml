version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: velnari_postgres
    environment:
      POSTGRES_USER: velnari
      POSTGRES_PASSWORD: velnari_dev
      POSTGRES_DB: velnari_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U velnari -d velnari_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: velnari_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
